env:
  APP_ENV: production
  REPORT_ROOT: /srv/reports
jobs:
  - name: rotate-logs
    command: "/usr/local/bin/rotate-app-logs"
    trigger:
      schedule: "0 0 3 * * *"
  - name: rebuild-report
    command: "/usr/local/bin/rebuild-report"
    trigger: manual
  - name: publish-report
    command: "/usr/local/bin/publish-report"
    trigger:
      after: rebuild-report
services:
  - name: report-watcher
    command: "/usr/local/bin/report-watcher"
    schedule:
      start: "0 0 8 * * mon-fri"
      stop: "0 0 18 * * mon-fri"
